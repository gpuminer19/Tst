<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CryptoGPU | Telegram Mining</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://telegram.org/js/telegram-web-app.js?56"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { background: #0B0E1A; font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; color: #fff; padding-bottom: 80px; }
  body::before { content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(ellipse at 30% 40%, #121936 0%, #070A14 100%); z-index: -2; }
  .header { background: rgba(8, 12, 24, 0.85); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0, 212, 255, 0.2); padding: 12px 20px 16px; border-radius: 0 0 28px 28px; }
  .user-info { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; background: rgba(0, 0, 0, 0.3); padding: 8px 12px; border-radius: 44px; }
  .avatar { width: 44px; height: 44px; background: linear-gradient(135deg, #00D4FF, #0066FF); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; }
  .user-name { flex: 1; }
  .user-name h3 { font-size: 16px; margin-bottom: 2px; }
  .user-name p { font-size: 10px; color: #6B7CA8; }
  .user-id { font-family: monospace; font-size: 11px; background: rgba(0,0,0,0.4); padding: 4px 10px; border-radius: 20px; }
  .balance-container { display: flex; gap: 12px; flex-wrap: wrap; }
  .balance-card { flex: 1; background: linear-gradient(135deg, rgba(0, 50, 100, 0.4), rgba(0, 20, 50, 0.6)); border-radius: 20px; padding: 10px 14px; backdrop-filter: blur(10px); border: 1px solid rgba(0, 212, 255, 0.25); }
  .balance-label { font-size: 10px; color: #8EA3D4; margin-bottom: 5px; }
  .balance-value { display: flex; align-items: center; gap: 6px; }
  .balance-value span { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #FFF, #A0C4FF); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .currency-icon { width: 22px; height: 22px; }
  .gpu-currency { background: linear-gradient(135deg, #FFB347, #FF8C00); border-radius: 30px; padding: 2px 6px; font-size: 9px; font-weight: bold; color: #1A1F2E; }
  .grid { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .card { background: rgba(12, 18, 32, 0.75); backdrop-filter: blur(12px); border-radius: 24px; padding: 12px; display: flex; gap: 12px; align-items: center; border: 1px solid rgba(0, 212, 255, 0.2); }
  .gpu-img { width: 65px; height: 65px; object-fit: contain; background: rgba(0, 0, 0, 0.4); border-radius: 18px; padding: 8px; }
  .card-info { flex: 1; }
  .card-info h3 { font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
  .badge { background: rgba(0, 212, 255, 0.2); padding: 2px 6px; border-radius: 20px; font-size: 8px; color: #00D4FF; }
  .rewards-info { display: flex; gap: 10px; font-size: 10px; color: #A0B4E0; margin-bottom: 6px; }
  button { background: linear-gradient(95deg, #1A2A5E, #0F1A3A); border: none; font-weight: 600; font-size: 12px; padding: 8px 12px; border-radius: 40px; color: white; width: 100%; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.15s; }
  button:active { transform: scale(0.97); }
  .claim-btn { background: linear-gradient(95deg, #008A5C, #00A86B); }
  .progress-bar { width: 100%; height: 24px; background: rgba(0, 0, 0, 0.5); border-radius: 40px; overflow: hidden; position: relative; margin-top: 6px; border: 1px solid rgba(0, 212, 255, 0.3); }
  .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #00D4FF, #0066FF); border-radius: 40px; transition: width 0.2s linear; }
  .progress-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: bold; gap: 3px; }
  .ref-stats { background: linear-gradient(135deg, #1A1F35, #11152A); margin: 16px; padding: 16px; border-radius: 28px; text-align: center; border: 1px solid rgba(255, 180, 71, 0.3); }
  .friend-count { font-size: 40px; font-weight: 800; background: linear-gradient(135deg, #FFB347, #FF8C00); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .friends-list { margin-top: 16px; max-height: 250px; overflow-y: auto; }
  .friend-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: rgba(0, 0, 0, 0.3); border-radius: 40px; margin-bottom: 6px; }
  .friend-avatar { width: 32px; height: 32px; background: linear-gradient(135deg, #FFB347, #FF8C00); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; }
  .friend-info { flex: 1; text-align: left; }
  .friend-name { font-size: 13px; font-weight: 600; }
  .friend-date { font-size: 9px; color: #8EA3D4; }
  .ref-link-box { background: rgba(0, 0, 0, 0.4); margin: 12px 16px; padding: 10px 14px; border-radius: 60px; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .ref-link-box span { font-size: 10px; font-family: monospace; color: #FFD699; word-break: break-all; }
  .copy-btn { width: auto; padding: 6px 14px; background: #FF8C00; margin: 0; }
  .bottom-nav { position: fixed; bottom: 10px; left: 10px; right: 10px; background: rgba(8, 12, 24, 0.95); backdrop-filter: blur(20px); border-radius: 44px; display: flex; justify-content: space-around; padding: 5px 8px; border: 1px solid rgba(0, 212, 255, 0.25); z-index: 100; }
  .nav-btn { background: transparent !important; box-shadow: none !important; width: auto !important; padding: 8px 16px !important; font-size: 20px !important; color: #5A6A8A !important; margin: 0 !important; }
  .nav-btn.active { color: #00D4FF !important; background: rgba(0, 212, 255, 0.15) !important; }
  .tab { display: none; animation: fade 0.25s ease; }
  .tab.active { display: block; }
  @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .loading { text-align: center; padding: 40px; color: #6B7CA8; }
  .deposit-box { margin: 16px; padding: 18px; border-radius: 24px; background: linear-gradient(135deg, #1A1F35, #11152A); border: 1px solid rgba(0, 212, 255, 0.3); }
  .deposit-box h3 { margin-bottom: 12px; font-size: 16px; }
  .deposit-box label { display: block; font-size: 11px; color: #8EA3D4; margin-bottom: 6px; }
  .deposit-box input { width: 100%; background: rgba(0,0,0,0.4); color: #fff; border: 1px solid rgba(0, 212, 255, 0.3); border-radius: 12px; padding: 12px; font-size: 16px; outline: none; }
  .deposit-box input:focus { border-color: #00D4FF; }
  .deposit-box .pay-btn { margin-top: 12px; background: linear-gradient(95deg, #00D4FF, #0066FF); color: #0B0E1A; }
  .pay-info { background: rgba(0,0,0,0.4); border-radius: 14px; padding: 12px; margin-top: 14px; font-size: 12px; word-break: break-all; }
  .pay-info .row { margin-bottom: 8px; }
  .pay-info .lbl { color: #8EA3D4; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .pay-info .val { font-family: monospace; color: #FFD699; background: rgba(0,0,0,0.4); padding: 6px 10px; border-radius: 8px; display: inline-block; max-width: 100%; word-break: break-all; }
  .pay-info .copy-mini { background: #FF8C00; padding: 4px 10px; font-size: 11px; width: auto; margin-left: 6px; display: inline-flex; }
  .pay-warn { background: rgba(255, 140, 0, 0.15); border: 1px solid rgba(255, 140, 0, 0.4); border-radius: 12px; padding: 10px; margin-top: 10px; font-size: 11px; color: #FFD699; }
</style>
</head>
<body>

<div id="app" style="display:none">
<div class="header">
  <div class="user-info" id="userInfo">
    <div class="avatar" id="avatar">👤</div>
    <div class="user-name">
      <h3 id="userFirstName">Загрузка...</h3>
      <p id="userStatus">Telegram ID: ---</p>
    </div>
    <div class="user-id" id="userIdShort">---</div>
  </div>

  <div class="balance-container">
    <div class="balance-card">
      <div class="balance-label">💰 TON Balance</div>
      <div class="balance-value">
        <span id="ton">0</span>
        <img src="ton.png" class="currency-icon">
      </div>
    </div>
    <div class="balance-card">
      <div class="balance-label">⚡ GPU Tokens</div>
      <div class="balance-value">
        <span id="gpuBalance">0</span>
        <span class="gpu-currency">GPU</span>
      </div>
    </div>
  </div>
</div>

<div id="home" class="tab active">
  <div class="grid" id="grid"></div>
</div>

<div id="referral" class="tab">
  <div class="ref-stats">
    <h3>👥 Приглашено друзей</h3>
    <div class="friend-count" id="friendCount">0</div>
    <div class="badge" style="display:inline-block; margin-top:4px;">5 друзей → 1 TON + 5 GPU | 50 → 10 TON + 50 GPU</div>
    <div class="friends-list" id="friendsList">
      <div style="text-align:center; padding:10px; color:#6B7CA8;">У вас пока нет приглашённых друзей</div>
    </div>
  </div>

  <div class="grid">
    <div class="card" id="refCard" style="border-color:#FFB347;">
      <img src="8.png" class="gpu-img" style="filter:drop-shadow(0 0 6px #FFB347);">
      <div class="card-info">
        <h3>⭐ DREAM GPU <span class="badge" style="background:#FF8C20;">легендарная</span></h3>
        <div id="refStatus"></div>
      </div>
    </div>
  </div>

  <div class="ref-link-box">
    <span id="refLink">загрузка...</span>
    <button class="copy-btn" id="copyRefBtn">📋 Коп</button>
  </div>
</div>

<div id="staking" class="tab"><div class="ref-stats"><i class="fa-solid fa-chart-line" style="font-size:48px;"></i><h3>Staking Pool</h3><p>Скоро</p></div></div>
<div id="tasks" class="tab"><div class="ref-stats"><i class="fa-solid fa-list-check" style="font-size:48px;"></i><h3>Задания</h3><p>Скоро</p></div></div>

<div id="wallet" class="tab">
  <div class="deposit-box">
    <h3>💳 Пополнить баланс TON</h3>
    <label>Сумма пополнения (TON)</label>
    <input id="depositAmount" type="number" min="0.1" step="0.1" placeholder="Например, 5">
    <button class="pay-btn" id="payBtn">💎 Оплатить</button>
    <div id="payResult"></div>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-btn active" onclick="openTab('home',this)"><i class="fa-solid fa-house"></i></button>
  <button class="nav-btn" onclick="openTab('referral',this)"><i class="fa-solid fa-user-group"></i></button>
  <button class="nav-btn" onclick="openTab('staking',this)"><i class="fa-solid fa-coins"></i></button>
  <button class="nav-btn" onclick="openTab('tasks',this)"><i class="fa-solid fa-list-check"></i></button>
  <button class="nav-btn" onclick="openTab('wallet',this)"><i class="fa-solid fa-wallet"></i></button>
</div>
</div>

<div id="loading" class="loading"><i class="fa-solid fa-spinner fa-spin"></i> Загрузка данных...</div>

<script>

// ========== НАСТРОЙКИ ==========
const API_URL = "https://tst-production-b90a.up.railway.app/api/tg"; // ЗАМЕНИТЕ НА ВАШ URL
const BOT_USERNAME = "Gputonminer_bot";

// ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
let tg = window.Telegram.WebApp;
let user = tg.initDataUnsafe?.user;
let userId = user?.id || "test_" + Math.floor(Math.random() * 10000);

// Данные игрока (загружаются с сервера)
let playerData = {
  ton: 0,
  gpuTokens: 0,
  friends: 0,
  invitedFriends: []
};

// Состояние видеокарт (с сервера)
let gpuStates = [];
let miningIntervals = [];

// Шаблоны видеокарт
const gpuTemplates = [
  { name: "GTX 1060", price: 1, tonReward: 1.2, gpuReward: 2, durationMs: 60000 },
  { name: "RTX 2060", price: 2, tonReward: 2.4, gpuReward: 4, durationMs: 120000 },
  { name: "RTX 3060", price: 3, tonReward: 3.6, gpuReward: 6, durationMs: 180000 },
  { name: "EPIC GPU", price: 5, tonReward: 6, gpuReward: 10, durationMs: 300000 }
];

// ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
function updateUI() {
  document.getElementById("ton").innerText = playerData.ton.toFixed(2);
  document.getElementById("gpuBalance").innerText = playerData.gpuTokens;
  document.getElementById("friendCount").innerText = playerData.friends;
}

function updateRefLink() {
  document.getElementById("refLink").innerText = `https://t.me/${BOT_USERNAME}?start=ref_${userId}`;
}

function renderFriendsList() {
  const container = document.getElementById("friendsList");
  if (!container) return;
  if (!playerData.invitedFriends || playerData.invitedFriends.length === 0) {
    container.innerHTML = '<div style="text-align:center; padding:10px; color:#6B7CA8;">😢 У вас пока нет приглашённых друзей</div>';
    return;
  }
  container.innerHTML = playerData.invitedFriends.map(f => `
    <div class="friend-item">
      <div class="friend-avatar">👤</div>
      <div class="friend-info">
        <div class="friend-name">${f.friend_name || f.name}</div>
        <div class="friend-date">Присоединился: ${f.date || "недавно"}</div>
      </div>
    </div>`).join('');
}

// ========== РАБОТА С БЭКЕНДОМ ==========
async function apiRequest(action, additionalData = {}) {
  try {
    const response = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        action: action,
        user_id: userId.toString(),
        name: user?.first_name || "Игрок",
        ...additionalData
      })
    });
    return await response.json();
  } catch (error) {
    console.error(`API Error (${action}):`, error);
    tg.showAlert("❌ Ошибка связи с сервером");
    return null;
  }
}

// Загрузка данных пользователя
async function loadUserData(referrerId = null) {
  const result = await apiRequest("register", { referrer_id: referrerId });
  if (result && result.success) {
    playerData = {
      ton: result.data.ton,
      gpuTokens: result.data.gpu,
      friends: result.data.friends,
      invitedFriends: result.data.invitedFriends || []
    };
    
    // Восстанавливаем состояние видеокарт
    if (result.data.state && result.data.state.gpuStates) {
      gpuStates = result.data.state.gpuStates;
    } else {
      initGpuStates();
    }
    
    updateUI();
    renderFriendsList();
    renderAllCards();
    startAllMinings();
    return true;
  }
  return false;
}

// Сохранение состояния видеокарт
async function saveGameState() {
  await apiRequest("save", {
    ton: playerData.ton,
    gpu: playerData.gpuTokens,
    friends: playerData.friends,
    state: { gpuStates: gpuStates }
  });
}

// Загрузка рефералов
async function loadReferrals() {
  const result = await apiRequest("getReferrals");
  if (result && result.success && result.referrals) {
    playerData.invitedFriends = result.referrals;
    playerData.friends = result.referrals.length;
    renderFriendsList();
    updateUI();
  }
}

// Создание заявки на пополнение
async function createDeposit(amount) {
  const result = await apiRequest("createDeposit", { amount: amount });
  if (result && result.success) {
    showPayInfo(result.deposit);
  } else {
    tg.showAlert("❌ Ошибка создания заявки");
  }
}

// ========== ЛОГИКА ВИДЕОКАРТ ==========
function initGpuStates() {
  gpuStates = gpuTemplates.map(() => ({
    active: false,
    totalTon: 0,
    totalGpu: 0,
    earnedTon: 0,
    earnedGpu: 0,
    startedAt: 0,
    durationMs: 0
  }));
}

async function buyGPU(idx) {
  const gpu = gpuTemplates[idx];
  const state = gpuStates[idx];
  
  if (playerData.ton < gpu.price) {
    tg.showAlert("❌ Недостаточно TON");
    return;
  }
  if (state.active) {
    tg.showAlert("⏳ Карта уже майнит");
    return;
  }
  
  // Списываем средства
  playerData.ton -= gpu.price;
  
  // Активируем майнинг
  state.active = true;
  state.totalTon = gpu.tonReward;
  state.totalGpu = gpu.gpuReward;
  state.earnedTon = 0;
  state.earnedGpu = 0;
  state.startedAt = Date.now();
  state.durationMs = gpu.durationMs;
  
  updateUI();
  renderCard(idx);
  startMining(idx);
  await saveGameState();
}

async function claimGPU(idx) {
  const state = gpuStates[idx];
  if (state.earnedTon < state.totalTon - 0.01) {
    tg.showAlert("⏳ Майнинг ещё не завершён");
    return;
  }
  
  // Начисляем награду
  playerData.ton += state.totalTon;
  playerData.gpuTokens += state.totalGpu;
  
  // Сбрасываем карту
  state.active = false;
  state.totalTon = 0;
  state.totalGpu = 0;
  state.earnedTon = 0;
  state.earnedGpu = 0;
  state.startedAt = 0;
  state.durationMs = 0;
  
  updateUI();
  renderCard(idx);
  await saveGameState();
}

function startMining(idx) {
  // Очищаем предыдущий интервал
  if (miningIntervals[idx]) clearInterval(miningIntervals[idx]);
  
  const state = gpuStates[idx];
  if (!state.active) return;
  
  miningIntervals[idx] = setInterval(() => {
    const elapsed = Date.now() - state.startedAt;
    const progress = Math.min(1, elapsed / state.durationMs);
    state.earnedTon = state.totalTon * progress;
    state.earnedGpu = state.totalGpu * progress;
    
    // Обновляем прогресс-бар
    const fill = document.getElementById(`fill_${idx}`);
    const text = document.getElementById(`text_${idx}`);
    if (fill) fill.style.width = (progress * 100) + "%";
    if (text) text.innerHTML = `${state.earnedTon.toFixed(2)}/${state.totalTon.toFixed(1)} TON`;
    
    // Если майнинг завершён
    if (progress >= 1) {
      clearInterval(miningIntervals[idx]);
      state.active = false;
      state.earnedTon = state.totalTon;
      state.earnedGpu = state.totalGpu;
      renderCard(idx);
      saveGameState();
    }
  }, 500);
}

function startAllMinings() {
  for (let i = 0; i < gpuStates.length; i++) {
    if (gpuStates[i] && gpuStates[i].active) {
      startMining(i);
    }
  }
}

// ========== ОТРИСОВКА КАРТОЧЕК ==========
function renderCard(idx) {
  const card = document.getElementById(`card_${idx}`);
  if (!card) return;
  
  const gpu = gpuTemplates[idx];
  const state = gpuStates[idx];
  
  if (state.active) {
    // Активный майнинг
    const progress = (Date.now() - state.startedAt) / state.durationMs;
    const percent = Math.min(100, progress * 100);
    card.innerHTML = `
      <img src="8.png" class="gpu-img">
      <div class="card-info">
        <h3>${gpu.name} ⚡</h3>
        <div class="progress-bar">
          <div class="progress-fill" id="fill_${idx}" style="width:${percent}%"></div>
          <div class="progress-text" id="text_${idx}">${state.earnedTon.toFixed(2)}/${state.totalTon} TON</div>
        </div>
      </div>
    `;
  } else if (state.totalTon > 0 && state.earnedTon >= state.totalTon - 0.01) {
    // Готово к получению
    card.innerHTML = `
      <img src="8.png" class="gpu-img">
      <div class="card-info">
        <h3>${gpu.name}</h3>
        <button class="claim-btn claim-gpu">🎁 Забрать ${state.totalTon} TON + ${state.totalGpu} GPU</button>
      </div>
    `;
    const claimBtn = card.querySelector('.claim-gpu');
    if (claimBtn) claimBtn.onclick = () => claimGPU(idx);
  } else {
    // Доступна для покупки
    card.innerHTML = `
      <img src="8.png" class="gpu-img">
      <div class="card-info">
        <h3>${gpu.name} <span class="badge">+20%</span></h3>
        <div class="rewards-info"><span>+${gpu.tonReward} TON</span><span>+${gpu.gpuReward} GPU</span></div>
        <button class="buy-btn">Купить ${gpu.price} TON</button>
      </div>
    `;
    const buyBtn = card.querySelector('.buy-btn');
    if (buyBtn) buyBtn.onclick = () => buyGPU(idx);
  }
}

function renderAllCards() {
  for (let i = 0; i < gpuTemplates.length; i++) {
    renderCard(i);
  }
}

function initGrid() {
  const grid = document.getElementById("grid");
  if (!grid) return;
  grid.innerHTML = "";
  for (let i = 0; i < gpuTemplates.length; i++) {
    const card = document.createElement("div");
    card.className = "card";
    card.id = `card_${i}`;
    grid.appendChild(card);
    renderCard(i);
  }
}

// ========== РЕФЕРАЛЬНАЯ СИСТЕМА ==========
function getRefRewards() {
  if (playerData.friends >= 50) return { ton: 10, gpu: 50 };
  if (playerData.friends >= 5) return { ton: 1, gpu: 5 };
  return { ton: 0, gpu: 0 };
}

async function startRefMining() {
  const rewards = getRefRewards();
  if (rewards.ton === 0) return;
  
  // Отправляем запрос на старт реферального майнинга
  const result = await apiRequest("startRefMining", { rewards });
  if (result && result.success) {
    tg.showAlert(`🎉 Майнинг начат! Через несколько секунд вы получите ${rewards.ton} TON и ${rewards.gpu} GPU`);
    // Обновляем данные после майнинга
    setTimeout(() => loadUserData(), 5000);
  }
}

// ========== АДМИН-ПАНЕЛЬ В ИГРЕ (опционально) ==========
function showPayInfo(deposit) {
  const html = `
    <div class="pay-info">
      <div class="row">
        <div class="lbl">Сумма</div>
        <span class="val">${deposit.amount} TON</span>
      </div>
      <div class="row">
        <div class="lbl">TON-кошелёк для перевода</div>
        <span class="val" id="payWallet">${deposit.wallet}</span>
        <button class="copy-mini" onclick="copyText('${deposit.wallet}')">📋</button>
      </div>
      <div class="row">
        <div class="lbl">Комментарий к переводу (обязательно!)</div>
        <span class="val" id="payComment">${deposit.comment}</span>
        <button class="copy-mini" onclick="copyText('${deposit.comment}')">📋</button>
      </div>
      <div class="pay-warn">
        ⚠️ Отправьте ровно <b>${deposit.amount} TON</b> на указанный кошелёк <b>с комментарием</b> выше.
        После подтверждения админом баланс будет зачислен автоматически.
      </div>
    </div>`;
  document.getElementById('payResult').innerHTML = html;
}

function copyText(text) {
  navigator.clipboard.writeText(text);
  tg.showAlert("📋 Скопировано");
}

// ========== НАВИГАЦИЯ ==========
window.openTab = function(id, btn) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  if (id === "referral") {
    loadReferrals();
    updateRefLink();
  }
};

// ========== ИНИЦИАЛИЗАЦИЯ ==========
async function init() {
  // Настраиваем Telegram
  tg.ready();
  tg.expand();
  
  // Отображаем информацию о пользователе
  if (user) {
    document.getElementById("userFirstName").innerText = user.first_name || "Игрок";
    if (user.username) document.getElementById("userStatus").innerHTML = `@${user.username}`;
    let avatarLetter = (user.first_name ? user.first_name[0] : (user.username ? user.username[0].toUpperCase() : "👤"));
    document.getElementById("avatar").innerText = avatarLetter;
    document.getElementById("userIdShort").innerText = `#${userId.toString().slice(-5)}`;
  } else {
    document.getElementById("userFirstName").innerText = "Тестовый игрок";
    document.getElementById("userIdShort").innerText = `#${userId.slice(-5)}`;
  }
  
  // Получаем реферальный ID из start_param
  let referrerId = null;
  if (tg.initDataUnsafe?.start_param) {
    const startParam = tg.initDataUnsafe.start_param;
    if (startParam.startsWith('ref_')) {
      referrerId = startParam.replace('ref_', '');
    }
  }
  
  // Загружаем данные с сервера
  initGpuStates();
  initGrid();
  const loaded = await loadUserData(referrerId);
  if (loaded) {
    updateRefLink();
    await loadReferrals();
  }
  
  // Скрываем загрузку, показываем игру
  document.getElementById("loading").style.display = "none";
  document.getElementById("app").style.display = "block";
  
  tg.MainButton.hide();
  tg.BackButton.hide();
}

// Обработчик кнопки пополнения
document.getElementById("payBtn").onclick = () => {
  const amount = parseFloat(document.getElementById("depositAmount").value);
  if (isNaN(amount) || amount <= 0) {
    tg.showAlert("❌ Введите корректную сумму");
    return;
  }
  createDeposit(amount);
};

// Обработчик копирования реферальной ссылки
document.getElementById("copyRefBtn").onclick = () => {
  const link = document.getElementById("refLink").innerText;
  navigator.clipboard.writeText(link);
  tg.showAlert("📋 Реферальная ссылка скопирована!");
};

// Запуск
init();

</script>
